<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness">
<title>Fitness Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d0d1a;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#f0f0f0;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:#0d0d1a}
.header{background:#111827;padding:env(safe-area-inset-top,12px) 16px 10px;border-bottom:1px solid #1f2937}
.header h1{font-size:18px;font-weight:600;text-align:center;color:#f9fafb}
.header .date{font-size:12px;color:#6b7280;text-align:center;margin-top:2px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 80px}
.nav{display:flex;background:#111827;border-top:1px solid #1f2937;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100}
.nav-btn{flex:1;background:none;border:none;color:#6b7280;font-size:10px;padding:2px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:#60a5fa}
.section{display:none}
.section.active{display:block}
.card{background:#1f2937;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #374151}
.card-title{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.big-stat{text-align:center;padding:10px;background:#111827;border-radius:10px;margin-bottom:10px}
.big-stat .val{font-size:24px;font-weight:bold;color:#60a5fa}
.pbar{background:#374151;border-radius:6px;height:7px;margin-top:5px;overflow:hidden}
.pfill{height:7px;border-radius:6px;transition:width .4s ease;background:#60a5fa}
.check-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #374151}
.cbtn{width:30px;height:30px;border-radius:50%;border:2px solid #374151;background:none;color:transparent}
.cbtn.done{background:#22c55e;border-color:#22c55e;color:#fff}
input,select{width:100%;background:#111827;border:1px solid #374151;border-radius:10px;padding:12px;margin-bottom:10px;color:#fff}
.btn{width:100%;background:#1d4ed8;color:#fff;border:none;border-radius:12px;padding:14px;font-weight:bold}
.food-chip{display:flex;justify-content:space-between;background:#111827;padding:10px;border-radius:8px;margin-bottom:5px}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>🏋️ Fitness Tracker</h1><div id="hdrDate"></div></div>
  <div class="content">
    <div class="section active" id="sec-today">
      <div class="card"><div class="card-title">Calories</div><div class="big-stat"><div class="val" id="todayCalVal">0</div></div><div class="pbar"><div class="pfill" id="calBar" style="width:0%"></div></div></div>
      <div class="card"><div class="card-title">Checklist</div><div id="checklistEl"></div></div>
    </div>
    <div class="section" id="sec-nutrition">
      <div class="card"><div class="card-title">Add Food</div>
        <select id="quickFood"><option value="">Presets...</option><option value="Smoothie|400|46">Smoothie</option><option value="Chicken/Rice|520|59">Chicken/Rice</option></select>
        <input type="text" id="cFoodName" placeholder="Food Name">
        <input type="number" id="cFoodCal" placeholder="Calories">
        <input type="number" id="cFoodProt" placeholder="Protein">
        <button class="btn" onclick="addFood()">Add Food</button>
      </div>
      <div id="todayFoodLog"></div>
    </div>
    <div class="section" id="sec-workout">
      <div class="card"><div class="card-title">Log Set</div>
        <select id="machSel"><option>Chest Press</option><option>Shoulder Press</option><option>Lat Pulldown</option></select>
        <input type="number" id="setWt" placeholder="Weight">
        <input type="number" id="setRps" placeholder="Reps">
        <button class="btn" style="background:#16a34a" onclick="logSet()">Log Set</button>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('today')">📊 Today</button>
    <button class="nav-btn" onclick="showTab('nutrition')">🥗 Food</button>
    <button class="nav-btn" onclick="showTab('workout')">💪 Gym</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybK8oD5lbsKZN_1K88tedUufTM75ePIrZS3_z1OfM5cUNo9UfYAeQ6bjyu6ad6LRxalw/exec';
const TODAY = new Date().toISOString().split('T')[0];

function load(k,d){const v=localStorage.getItem(k);return v?JSON.parse(v):d}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

let foodLog=load('foodLog',[]);
let checks=load('dailyChecks',[]);
let workouts=load('workouts',[]);

async function syncData(type, data) {
  try {
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type, date: TODAY, ...data }) });
  } catch (e) { console.log(e); }
}

function showTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
}

function addFood(){
  const qs=document.getElementById('quickFood').value;
  let name,cal,prot;
  if(qs){ [name,cal,prot]=qs.split('|'); } 
  else { name=document.getElementById('cFoodName').value; cal=document.getElementById('cFoodCal').value; prot=document.getElementById('cFoodProt').value; }
  if(!name) return;
  foodLog.push({date:TODAY,name,cal:Number(cal),prot:Number(prot)});
  save('foodLog',foodLog);
  syncData('food', {name, cal, prot});
  render();
}

function logSet(){
  const machine=document.getElementById('machSel').value;
  const weight=document.getElementById('setWt').value;
  const reps=document.getElementById('setRps').value;
  workouts.push({date:TODAY,machine,weight,reps});
  save('workouts',workouts);
  syncData('workout', {machine, weight, reps});
}

function toggleCheck(k){
  let tc=checks.find(c=>c.date===TODAY)||{date:TODAY};
  tc[k]=tc[k]?0:1;
  if(!checks.find(c=>c.date===TODAY)) checks.push(tc);
  save('dailyChecks',checks);
  syncData('habit', {habit: k, value: tc[k]});
  render();
}

function render(){
  const day=foodLog.filter(f=>f.date===TODAY);
  const c=day.reduce((a,f)=>a+f.cal,0);
  document.getElementById('todayCalVal').textContent=c;
  document.getElementById('calBar').style.width=Math.min((c/1800)*100,100)+'%';
  const tc=checks.find(c=>c.date===TODAY)||{};
  document.getElementById('checklistEl').innerHTML=['smoothie','chicken','walk'].map(i=>`
    <div class="check-row"><span>${i}</span><button class="cbtn ${tc[i]?'done':''}" onclick="toggleCheck('${i}')">✓</button></div>
  `).join('');
  document.getElementById('todayFoodLog').innerHTML=day.map(f=>`<div class="food-chip"><span>${f.name}</span><span>${f.cal}</span></div>`).join('');
}

document.getElementById('hdrDate').textContent=new Date().toDateString();
render();
</script>
</body>
</html>
