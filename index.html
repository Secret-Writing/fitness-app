<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitness">
<title>Fitness Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d0d1a;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#f0f0f0;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:#0d0d1a}
.header{background:#111827;padding:env(safe-area-inset-top,12px) 16px 10px;border-bottom:1px solid #1f2937}
.header h1{font-size:18px;font-weight:600;text-align:center;color:#f9fafb}
.header .date{font-size:12px;color:#6b7280;text-align:center;margin-top:2px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 80px}
.nav{display:flex;background:#111827;border-top:1px solid #1f2937;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100}
.nav-btn{flex:1;background:none;border:none;color:#6b7280;font-size:10px;padding:2px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:#60a5fa}
.nav-icon{font-size:22px;line-height:1}
.section{display:none}
.section.active{display:block}
.card{background:#1f2937;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #374151}
.card-title{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.big-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.big-stat{background:#1f2937;border-radius:14px;padding:14px;border:1px solid #374151;text-align:center}
.big-stat .val{font-size:26px;font-weight:700;color:#f9fafb}
.big-stat .lbl{font-size:11px;color:#9ca3af;margin-top:2px}
.big-stat .sub{font-size:11px;margin-top:3px;font-weight:500}
.pbar{background:#374151;border-radius:6px;height:7px;margin-top:5px;overflow:hidden}
.pfill{height:7px;border-radius:6px;transition:width .4s ease}
.check-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #374151}
.check-label{font-size:15px;color:#f9fafb}
.cbtn{width:30px;height:30px;border-radius:50%;border:2px solid #374151;background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;color:transparent}
.cbtn.done{background:#22c55e;border-color:#22c55e;color:#fff}
.water-grid{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0 4px}
.wdrop{width:38px;height:38px;border-radius:50%;border:2px solid #60a5fa;background:none;cursor:pointer;font-size:19px;display:flex;align-items:center;justify-content:center;transition:all .15s;opacity:.35}
.wdrop.on{background:#1d4ed8;border-color:#60a5fa;opacity:1}
.wlabel{font-size:13px;color:#9ca3af;text-align:center;margin-top:4px}
input,select{width:100%;background:#111827;border:1px solid #374151;border-radius:10px;padding:10px 12px;font-size:15px;color:#f9fafb;font-family:inherit;outline:none;margin-bottom:10px}
.btn{width:100%;background:#1d4ed8;color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn.green{background:#16a34a}
.food-chip{display:flex;justify-content:space-between;align-items:center;background:#111827;border:1px solid #374151;border-radius:10px;padding:8px 12px;margin-bottom:6px}
.rm-btn{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer}
.weight-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #374151}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.pill.down{background:#14532d;color:#4ade80}
.pill.up{background:#450a0a;color:#f87171}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🏋️ Fitness Tracker</h1>
    <div class="date" id="hdrDate"></div>
  </div>

  <div class="content">
    <div class="section active" id="sec-today">
      <div class="big-stats">
        <div class="big-stat">
          <div class="val" id="todayCalVal">0</div>
          <div class="lbl">Calories</div>
          <div class="sub" style="color:#f59e0b">Goal: 1,800</div>
        </div>
        <div class="big-stat">
          <div class="val" id="todayProtVal">0g</div>
          <div class="lbl">Protein</div>
          <div class="sub" style="color:#22c55e">Goal: 100g+</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Calorie progress</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#9ca3af;margin-bottom:5px">
          <span id="calPctLbl">0%</span><span id="calRemLbl">1,800 remaining</span>
        </div>
        <div class="pbar"><div class="pfill" id="calBar" style="width:0%"></div></div>
      </div>
      <div class="card"><div class="card-title">Daily checklist</div><div id="checklistEl"></div></div>
      <div class="card">
        <div class="card-title">💧 Water Tracker</div>
        <div class="water-grid" id="waterDrops"></div>
        <div class="wlabel" id="waterLbl">0 / 100 oz</div>
      </div>
    </div>

    <div class="section" id="sec-nutrition">
      <div class="card">
        <div class="card-title">Log food</div>
        <select id="quickFood">
          <option value="">Quick add preset...</option>
          <option value="Smoothie|400|46">Smoothie (400 cal, 46g)</option>
          <option value="Chicken/Rice/Veggies|520|59">Chicken/Rice (520 cal, 59g)</option>
          <option value="Kirkland Beef Stick|100|10">Beef Stick (100 cal, 10g)</option>
        </select>
        <input type="text" id="cFoodName" placeholder="Food name">
        <input type="number" id="cFoodCal" placeholder="Calories">
        <input type="number" id="cFoodProt" placeholder="Protein (g)">
        <button class="btn" onclick="addFood()">+ Add food</button>
      </div>
      <div class="card"><div class="card-title">Today's log</div><div id="todayFoodLog"></div></div>
    </div>

    <div class="section" id="sec-workout">
      <div class="card">
        <div class="card-title">Log a set</div>
        <select id="machSel">
          <option>Seated Chest Press</option><option>Shoulder Press</option>
          <option>Lat Pulldown</option><option>Seated Row</option>
          <option>Leg Press</option><option>Bicep Curl</option>
        </select>
        <input type="number" id="setWt" placeholder="Weight (lbs)">
        <input type="number" id="setRps" placeholder="Reps">
        <button class="btn green" onclick="logSet()">Log set</button>
      </div>
      <div class="card" id="loggedCard" style="display:none">
        <div class="card-title">Logged today</div>
        <div id="loggedSetsEl"></div>
      </div>
    </div>

    <div class="section" id="sec-progress">
      <div class="card">
        <div class="card-title">Log weight</div>
        <input type="number" id="wtInput" placeholder="172.0" step="0.1">
        <input type="text" id="wtNote" placeholder="Notes (optional)">
        <button class="btn" onclick="logWeight()">Save weight</button>
      </div>
      <div class="card"><div class="card-title">History</div><div id="wtHistory"></div></div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('today')">📊 Today</button>
    <button class="nav-btn" onclick="showTab('nutrition')">🥗 Food</button>
    <button class="nav-btn" onclick="showTab('workout')">💪 Gym</button>
    <button class="nav-btn" onclick="showTab('progress')">📈 Stats</button>
  </div>
</div>

<script>
// --- CONFIG & STORAGE ---
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybK8oD5lbsKZN_1K88tedUufTM75ePIrZS3_z1OfM5cUNo9UfYAeQ6bjyu6ad6LRxalw/exec';
const TODAY = new Date().toISOString().split('T')[0];

function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

let foodLog=load('foodLog', []);
let checks=load('dailyChecks', []);
let weights=load('weights', []);
let workouts=load('workouts', []);
let waterDrops=load('waterDrops', Array(13).fill(0));

// --- SYNC ENGINE ---
async function syncData(type, data) {
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ type, date: TODAY, ...data })
    });
  } catch (e) { console.error('Sync error', e); }
}

// --- LOGIC FUNCTIONS ---
function showTab(t){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  event.currentTarget.classList.add('active');
}

function addFood(){
  const qs=document.getElementById('quickFood').value;
  let name,cal,prot;
  if(qs){ [name,cal,prot]=qs.split('|'); cal=Number(cal); prot=Number(prot); }
  else {
    name=document.getElementById('cFoodName').value;
    cal=Number(document.getElementById('cFoodCal').value);
    prot=Number(document.getElementById('cFoodProt').value);
  }
  if(!name || !cal) return;
  const entry = {date: TODAY, name, cal, prot};
  foodLog.push(entry);
  save('foodLog', foodLog);
  syncData('food', entry);
  renderTodayStats();
  renderTodayFoodLog();
}

function logSet(){
  const machine=document.getElementById('machSel').value;
  const weight=Number(document.getElementById('setWt').value);
  const reps=Number(document.getElementById('setRps').value);
  if(!weight || !reps) return;
  const entry = {date: TODAY, machine, weight, reps};
  workouts.push(entry);
  save('workouts', workouts);
  syncData('workout', entry);
  renderLoggedSets();
  renderChecklist();
}

function logWeight(){
  const weight=Number(document.getElementById('wtInput').value);
  const note=document.getElementById('wtNote').value;
  if(!weight) return;
  const entry = {date: TODAY, weight, note};
  weights.push(entry);
  save('weights', weights);
  syncData('weight', entry);
  renderWeightHistory();
}

function toggleCheck(key){
  let tc = checks.find(c => c.date === TODAY) || {date: TODAY};
  tc[key] = tc[key] ? 0 : 1;
  const idx = checks.findIndex(c => c.date === TODAY);
  if(idx >= 0) checks[idx] = tc; else checks.push(tc);
  save('dailyChecks', checks);
  syncData('habit', { habit: key, value: tc[key] });
  renderChecklist();
}

// --- RENDERING ---
function renderTodayStats(){
  const day = foodLog.filter(f => f.date === TODAY);
  const c = day.reduce((a,f) => a + f.cal, 0);
  const p = day.reduce((a,f) => a + f.prot, 0);
  document.getElementById('todayCalVal').textContent = c;
  document.getElementById('todayProtVal').textContent = p + 'g';
  const pct = Math.min((c/1800)*100, 100);
  document.getElementById('calBar').style.width = pct + '%';
}

function renderChecklist(){
  const tc = checks.find(c => c.date === TODAY) || {};
  const items = ['smoothie', 'chicken', 'dinner', 'walk'];
  const el = document.getElementById('checklistEl');
  el.innerHTML = items.map(i => `
    <div class="check-row">
      <span class="check-label">${i.charAt(0).toUpperCase() + i.slice(1)}</span>
      <button class="cbtn ${tc[i]?'done':''}" onclick="toggleCheck('${i}')">${tc[i]?'✓':''}</button>
    </div>
  `).join('');
}

function renderWater(){
  const el = document.getElementById('waterDrops');
  el.innerHTML = waterDrops.map((on, i) => `
    <button class="wdrop ${on?'on':''}" onclick="toggleWater(${i})">💧</button>
  `).join('');
  document.getElementById('waterLbl').textContent = (waterDrops.filter(d=>d).length * 8) + ' / 100 oz';
}

function toggleWater(i){
  waterDrops[i] = waterDrops[i] ? 0 : 1;
  save('waterDrops', waterDrops);
  const total = waterDrops.filter(d=>d).length * 8;
  syncData('habit', { habit: 'water', value: total });
  renderWater();
}

function renderTodayFoodLog(){
  const el = document.getElementById('todayFoodLog');
  const day = foodLog.filter(f => f.date === TODAY);
  el.innerHTML = day.map(f => `<div class="food-chip"><span>${f.name}</span><span>${f.cal} cal</span></div>`).join('');
}

function renderLoggedSets(){
  const el = document.getElementById('loggedSetsEl');
  const day = workouts.filter(w => w.date === TODAY);
  if(day.length) document.getElementById('loggedCard').style.display='block';
  el.innerHTML = day.map(w => `<div class="food-chip"><span>${w.machine}</span><span>${w.weight}lbs x ${w.reps}</span></div>`).join('');
}

function renderWeightHistory(){
  const el = document.getElementById('wtHistory');
  el.innerHTML = weights.slice().reverse().map(w => `
    <div class="weight-item"><span>${w.date}</span><span>${w.weight} lbs</span></div>
  `).join('');
}

// --- INIT ---
document.getElementById('hdrDate').textContent = new Date().toDateString();
renderTodayStats();
renderChecklist();
renderWater();
renderTodayFoodLog();
renderLoggedSets();
renderWeightHistory();
</script>
</body>
</html>
